<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba Cloudflare Pages</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #f38020; } /* Warna khas Cloudflare */
        p { line-height: 1.6; }
        .status {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #e6fffa;
            color: #234e52;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sukses! 🚀 = halaman ke 2</h1>
        <p>Website statis kamu berhasil dideploy di <strong>Cloudflare Pages</strong>.</p>
        <div class="status">Status: Update Done</div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <small>Dibuat untuk keperluan testing.</small>
    </div>

</body>
</html>
